<svg width="280" height="340" viewBox="0 0 280 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <clipPath id="photoClip">
      <circle cx="140" cy="100" r="60"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="280" height="340" rx="20" fill="url(#bgGrad)"/>
  
  <!-- Card container -->
  <rect x="15" y="15" width="250" height="310" rx="15" fill="#1a1a2e" opacity="0.95"/>
  
  <!-- User photo (using the alex.svg as base) -->
  <g clip-path="url(#photoClip)">
    <circle cx="140" cy="100" r="60" fill="#2d3436"/>
    <circle cx="140" cy="75" r="40" fill="#e17055"/>
    <ellipse cx="140" cy="160" rx="50" ry="55" fill="#e17055"/>
    <circle cx="120" cy="70" r="5" fill="#fff"/>
    <circle cx="160" cy="70" r="5" fill="#fff"/>
    <path d="M125 90 Q140 100 155 90" stroke="#fff" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Frame around photo -->
  <circle cx="140" cy="100" r="60" fill="none" stroke="#fff" stroke-width="4"/>
  
  <!-- OK Hand Gesture overlay -->
  <g transform="translate(180, 60)">
    <circle cx="20" cy="20" r="18" fill="rgba(0,0,0,0.5)"/>
    <!-- Hand shape simplified -->
    <ellipse cx="20" cy="22" rx="14" ry="16" fill="#f5d0c5" transform="rotate(-10 20 22)"/>
    <!-- OK circle fingers -->
    <circle cx="12" cy="18" r="7" fill="#f5d0c5"/>
    <circle cx="26" cy="16" r="5" fill="#f5d0c5"/>
    <!-- Thumb -->
    <ellipse cx="20" cy="30" rx="5" ry="8" fill="#f5d0c5" transform="rotate(-30 20 30)"/>
  </g>
  
  <!-- Gesture label -->
  <text x="200" y="100" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#fff">OK</text>
  
  <!-- Instructions card -->
  <rect x="25" y="180" width="230" height="140" rx="12" fill="#fff" opacity="0.95"/>
  
  <!-- Title -->
  <text x="140" y="205" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">
    Как сделать верификацию:
  </text>
  
  <!-- Steps -->
  <g fill="none" stroke="#666" stroke-width="1.5">
    <!-- Step 1 -->
    <circle cx="50" cy="230" r="12" fill="#667eea"/>
    <text x="50" y="233" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">1</text>
    <text x="70" y="233" text-anchor="start" font-family="Arial" font-size="11" fill="#555">Откройте камеру</text>
    
    <!-- Step 2 -->
    <circle cx="50" cy="255" r="12" fill="#667eea"/>
    <text x="50" y="258" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">2</text>
    <text x="70" y="258" text-anchor="start" font-family="Arial" font-size="11" fill="#555">Покажите жест "OK"</text>
    
    <!-- Step 3 -->
    <circle cx="50" cy="280" r="12" fill="#667eea"/>
    <text x="50" y="283" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">3</text>
    <text x="70" y="283" text-anchor="start" font-family="Arial" font-size="11" fill="#555">Сделайте селфи</text>
  </g>
  
  <!-- Tips -->
  <text x="140" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">
    ✓ Хорошее освещение &nbsp; ✓ Лицо видно &nbsp; ✓ Жест чёткий
  </text>
  
  <!-- Arrow indicator -->
  <path d="M140 165 L140 175" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <path d="M135 170 L140 177 L145 170" stroke="#fff" stroke-width="3" fill="none"/>
</svg>